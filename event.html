<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chùa Diên Phước - NPĐ Chính Phước</title>
    <link rel="shortcut icon" href="./logo.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="./styles/event.css">
</head>
<body>

    <!-- Header (Navigation) -->
    <header class="header">
        <div class="container header-container">
            <a href="https://chuachinhphuoc.vercel.app/" class="logo">
                <img src="./logo.jpg" alt="Logo">
                <span>Chùa Diên Phước - NPĐ Chính Phước</span>
            </a>
        </div>
    </header>

    <div id="event-content-wrapper">
        <!-- Loading State -->
        <div class="event-header skeleton" style="height: 50vh;"></div>
        <div class="event-body">
            <div class="skeleton" style="height: 30px; width: 100%; margin-bottom: 15px;"></div>
            <div class="skeleton" style="height: 30px; width: 90%; margin-bottom: 15px;"></div>
            <div class="skeleton" style="height: 30px; width: 80%; margin-bottom: 15px;"></div>
        </div>
    </div>

    <script src="./scripts/event.js"></script>
</body>
</html>
